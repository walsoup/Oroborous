name: Build Android APK (Capacitor Hybrid)

on:
  workflow_dispatch:
  push:
    paths:
      - "frontend/**"

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js Web Assets
        run: npm run build

      - name: Generate Native Android Code (Capacitor)
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap add android || true
          npx cap sync android

      - name: Build Standalone APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          export NODE_BINARY=$(which node)
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-capacitor-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          
